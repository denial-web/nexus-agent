# Nexus Agent — Docker Compose
#
# Profiles:
#   default          → SQLite (single-file, no external deps)
#   --profile prod   → Postgres 16 + Redis 7 + Nexus (production stack)
#
# Quick start:
#   cp .env.example .env   # fill in API keys
#   docker compose up -d                          # SQLite dev
#   docker compose --profile prod up -d           # full prod stack

services:
  # ---------- SQLite mode (default) ----------
  nexus:
    build: .
    ports:
      - "${NEXUS_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite:////app/data/nexus.db"
    volumes:
      - nexus-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # ---------- Production mode (--profile prod) ----------
  nexus-prod:
    build: .
    ports:
      - "${NEXUS_PORT:-9000}:9000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://nexus:${POSTGRES_PASSWORD:-nexus}@postgres:5432/nexus_db"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    profiles:
      - prod

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-nexus}"
      POSTGRES_DB: nexus_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    profiles:
      - prod

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
    profiles:
      - prod

volumes:
  nexus-data:
  pg-data:
  redis-data:
