<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nexus Agent{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="logo">Nexus<span>Agent</span>{% if local_only %}<span class="local-badge">LOCAL</span>{% endif %}</div>
    <div class="links">
      <a href="/dashboard" class="{% if active == 'traces' %}active{% endif %}">Traces</a>
      <a href="/dashboard/labeling" class="{% if active == 'labeling' %}active{% endif %}">Labeling</a>
      <a href="/dashboard/approvals" class="{% if active == 'approvals' %}active{% endif %}">Approvals</a>
      <a href="/dashboard/calibration" class="{% if active == 'calibration' %}active{% endif %}">Calibration</a>
      <a href="/dashboard/providers" class="{% if active == 'providers' %}active{% endif %}">Providers</a>
      <a href="/dashboard/circuit-breakers" class="{% if active == 'circuit_breakers' %}active{% endif %}">Circuit Breakers</a>
      <a href="/dashboard/skills" class="{% if active == 'skills' %}active{% endif %}">Skills</a>
      <a href="/dashboard/logout" style="margin-left:auto;opacity:0.6">Logout</a>
    </div>
  </nav>
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
</body>
</html>
