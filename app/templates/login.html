<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Agent — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .login-box { max-width: 400px; margin: 80px auto; }
    .login-box h1 { margin-bottom: 0.5rem; }
    .login-box p { color: #888; margin-bottom: 1.5rem; }
    .login-box input[type="password"] {
      width: 100%; padding: 0.75rem; border: 1px solid #333;
      border-radius: 6px; background: #1a1a2e; color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace; font-size: 0.95rem;
    }
    .login-box button {
      margin-top: 1rem; width: 100%; padding: 0.75rem;
      border: none; border-radius: 6px; background: #7c3aed;
      color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem;
    }
    .login-box button:hover { background: #6d28d9; }
    .error { color: #f87171; margin-top: 0.75rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Nexus<span style="color:#7c3aed">Agent</span></h1>
    <p>Enter API key to access the dashboard.</p>
    <form method="POST" action="/dashboard/login">
      <input type="password" name="api_key" placeholder="API Key" autofocus required>
      <button type="submit">Sign In</button>
    </form>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </div>
</body>
</html>
