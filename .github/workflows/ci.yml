name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff format (check only)
        run: ruff format --check app/ tests/

      - name: Lint check
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/

      - name: Dependency audit
        # diskcache CVE-2025-69872: pickle-based deserialization in the cache
        # store. Pulled transitively (not imported anywhere in app/); exploit
        # requires write access to the cache directory which is outside our
        # threat model. No upstream fix is available yet — revisit when
        # diskcache ships a patched release.
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-69872

  memory-regression:
    # Dedicated fast gate for the two-tier memory regression tripwire
    # (tests/test_memory_regression.py). Its job is to prove that the
    # opt-in memory subsystem introduced in Phase 12A produces ZERO
    # behavioral change when MEMORY_ENABLED=False:
    #   Tier A — schema + behavior invariance (no belief rows, no new
    #            Covernor memory:* policy evaluations, no shape drift).
    #   Tier B — fixture-frozen pipeline parity against
    #            tests/fixtures/pipeline_golden.json (captured pre-memory).
    # Failing this check means a PR leaked memory behavior into the
    # default path — MUST fix before merging, regardless of what the
    # rest of the test matrix says. Runs SQLite-only because the
    # tripwire is a behavioral contract, not a dialect portability
    # test; the full `test-postgres` job still exercises it as part of
    # the complete suite.
    runs-on: ubuntu-latest
    needs: lint
    env:
      MEMORY_ENABLED: "false"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations (SQLite)
        run: alembic upgrade head

      - name: Run Tier A + Tier B regression tripwire
        run: pytest tests/test_memory_regression.py -v --tb=short

      - name: Summary
        if: always()
        run: |
          echo "## Memory Regression Tripwire" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tier A (schema + behavior invariance) and Tier B" >> "$GITHUB_STEP_SUMMARY"
          echo "(fixture-frozen pipeline parity) protect the" >> "$GITHUB_STEP_SUMMARY"
          echo "pre-memory default path. If this check fails on a PR," >> "$GITHUB_STEP_SUMMARY"
          echo "something outside the MEMORY_ENABLED=True code path" >> "$GITHUB_STEP_SUMMARY"
          echo "changed trace behavior or emitted memory side effects." >> "$GITHUB_STEP_SUMMARY"
          echo "Golden fixture lives at" >> "$GITHUB_STEP_SUMMARY"
          echo "\`tests/fixtures/pipeline_golden.json\`. See" >> "$GITHUB_STEP_SUMMARY"
          echo "\`MEMORY_FLAGSHIP_PLAN.md\` section 1 for the contract." >> "$GITHUB_STEP_SUMMARY"

  test-sqlite:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations (SQLite)
        run: alembic upgrade head

      - name: Run tests (SQLite)
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Append coverage summary to job summary
        if: always()
        run: |
          echo "## Coverage (SQLite)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          coverage report --skip-covered | tail -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-sqlite
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-sqlite
          path: coverage.xml
          retention-days: 14

  test-postgres:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
          # Run the Postgres server in a non-UTC timezone so timezone-related
          # portability bugs (e.g. tz-aware datetimes being shifted when
          # stored in TIMESTAMP WITHOUT TIME ZONE columns) fail loudly in CI
          # instead of silently passing. The app pins every session to UTC
          # in app/db.py; this env sanity-checks that pin.
          TZ: Asia/Phnom_Penh
          PGTZ: Asia/Phnom_Penh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test
      TEST_DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations (Postgres)
        run: alembic upgrade head

      - name: Run tests (Postgres)
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Append coverage summary to job summary
        if: always()
        run: |
          echo "## Coverage (Postgres)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          coverage report --skip-covered | tail -30 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-postgres
          path: coverage.xml
          retention-days: 14
